version: "3.8"

services:
  backend:
    build:
      context: ./backend
    container_name: ai-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
      - ./backend/model_artifacts:/app/model_artifacts
    ports:
      - "8000:8000"
    depends_on:
      - data_updater
    environment:
      - MODEL_ARTIFACTS_DIR=/app/model_artifacts
      - DATA_DIR=/app/data

  frontend:
    build:
      context: ./frontend
    container_name: ai-frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend/src:/usr/src/app/src
    ports:
      - "3000:3000"
    depends_on:
      - backend

  data_updater:
    build:
      context: ./data_updater
    container_name: ai-data-updater
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
      - ./backend/model_artifacts:/app/model_artifacts
    environment:
      - DATA_DIR=/app/data
      - MODEL_ARTIFACTS_DIR=/app/model_artifacts
      - UPDATE_TICKERS=AAPL,MSFT,GOOG,AMZN,META,TSLA,NVDA,JPM,JNJ,V